<!DOCTYPE html>
    <head>
        <script src="eventFormSignUp.js"></script>
        <style src="generalFormatting.css"></style>
        <style src="eventFormSignUp.css"></style>
    </head>
    <body>
        <h1>Event Sign Up Form</h1>
        <form>
            <label class = "required" for="forename">Forename:</label><br>
                <input type="text" id="forename" name="forename" required 
                placeholder="Enter Forename"
                oninvalid="this.setCustomValidity('Enter Forename Here')"
                oninput="setCustomValidity('')"><br>
            <label class = "required" for="surname">Surname:</label><br>
                <input type="text" id="surname" name="surname" required 
                placeholder="Enter Surname"
                oninvalid="this.setCustomValidity('Enter Surname Here')"
                oninput="setCustomValidity('')"><br>
            <label class = "required" for="email">Email:</label><br>
                <input type="email" id="email" name="email" required 
                pattern="(?!(^[.-].*|[^@]*\.@|.*\.{2,}.*)|^.{254}.)([a-zA-Z0-9!#$%&'*+\/=?^_`{|}~.-]
                +@)(?!-.*|.*-\.)([a-zA-Z0-9-]{1,63}\.)+[a-zA-Z]{2,15}"
                oninvalid="this.setCustomValidity('Enter Email Here')"
                oninput="setCustomValidity('')"><br>
            <!--STORE THE EVENT BEING SUBMITTED!-->
            <!--Validate, then do more stuff 
            (pop up saying you've completed the form, then count down before stopping?)-->
            <input type="submit" value="Submit">
        </form>
    </body> 
</html>
