<!DOCTYPE html>
<html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<meta charset="UTF-8">
<title>Events App</title>

<style>

/* GENERAL */

body{
font-family:Arial, sans-serif;
background:#f3efe9;
padding:60px;
}

/* HEADER */

h1{
font-size:40px;
margin-bottom:10px;rgb
}

.events-count{
color:#666;
margin-bottom:40px;
}

/* GRID */

.events-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

/* CARD */

.event-card{
background:rgb(244, 241, 240);
border-radius:20px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
transition:0.2s;
cursor:pointer;
}

.event-card:hover{
transform:translateY(-6px);
}

/* ICON AREA */

.event-image{
height:120px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
position:relative;
}


/* CATEGORY BUTTON */

.category-btn{
position:absolute;
top:10px;
left:10px;
background:rgb(186, 229, 246);
padding:4px 10px;
border-radius:12px;
font-size:12px;
font-weight:bold;
box-shadow:0 2px 5px rgba(246, 70, 70, 0.1);
}

/* CATEGORY COLORS */

.sports{background:#b3fad3;}
.social{background:#efe0d7;}
.study{background:#dbe3ee;}
.culture{background:#e8e0f2;}

/* DETAILS */

.event-details{
padding:20px;
}

.event-meta{
color:#666;
font-size:14px;
}

/* Nsvigstion hover colour */
nav a:hover {
  background: #fdf0ea;
  color: #e85d26 !important;
}


/* ======================= */
/* EVENT DETAILS SECTION */
/* ======================= */

.event-box{
background:rgb(248, 241, 167);
max-width:500px;
margin:auto;
padding:40px;
border-radius:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
text-align:center;
display:none;
}

.event-icon{
font-size:60px;
margin-bottom:20px;
}

.event-title{
font-size:28px;
margin-bottom:10px;
}

.event-info{
color:#666;
margin:8px 0;
}

.buttons{
margin-top:30px;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

.going{
background:#4CAF50;
color:white;
}

.favourite{
background:#ff9800;
color:white;
}

.back{
background:#6c63ff;
color:white;
}

</style>

</head>

<body>

  <nav style="
  position: sticky;
  top: 0;
  z-index: 100;
  height: 64px;
  background: rgba(245, 242, 235, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid #e2ddd4;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
">
  <div style="
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #1a1a18;
  ">
    Campus<span style="color: #e85d26;">Events</span>
  </div>
  <div style="display: flex; gap: 8px;">
    <a href="index.html" style="
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: #6b6b63;
      padding: 6px 14px;
      border-radius: 8px;
    ">Home</a>
    <a href="browse-events.html" style="
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: #e85d26;
      background: #fdf0ea;
      padding: 6px 14px;
      border-radius: 8px;
    ">Browse Events</a>
  </div>
</nav>


<!-- ======================= -->
<!-- ALL EVENTS PAGE -->
<!-- ======================= -->

<div id="eventsPage">

<h1>All Events</h1>
<p class="events-count">Showing 8 events</p>

  <!-- SEARCH BAR  -->
<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input type="text" id="searchInput" placeholder="Search events, locations…" autocomplete="off" />
</div>

<!-- FILTER BUTTONS -->
<div class="filter-strip" id="filterStrip">
  <button class="filter-btn active" data-cat="All">All</button>
  <button class="filter-btn" data-cat="Sports">Sports</button>
  <button class="filter-btn" data-cat="Study">Study</button>
  <button class="filter-btn" data-cat="Social">Social</button>
  <button class="filter-btn" data-cat="Culture">Culture</button>
</div>

<div class="events-grid" id="eventsGrid"></div>

</div>



<!-- ======================= -->
<!-- EVENT DETAILS PAGE -->
<!-- ======================= -->

<div id="eventDetails" class="event-box">

<div id="icon" class="event-icon"></div>

<h1 id="title" class="event-title"></h1>

<p id="date" class="event-info"></p>
<p id="time" class="event-info"></p>
<p id="location" class="event-info"></p>

<div class="buttons">

<button class="going" onclick="rsvpEvent()">I'm Going!</button>

<button class="favourite" onclick="saveEvent()">Save Favourite</button>

<br>

<button class="back" onclick="goBack()">Back to Events</button>

</div>

</div>


<script src="events.js"></script>

<script>

/* DISPLAY EVENTS */

const grid = document.getElementById("eventsGrid");

events.forEach(event => {

const card = document.createElement("div");
card.className = "event-card";

card.innerHTML = `
<div class="event-image ${event.category}">
<span class="category-btn">${event.category}</span>
${event.icon}
</div>

<div class="event-details">
<h3>${event.title}</h3>
<p class="event-meta">${event.date}</p>
</div>
`;

card.onclick = () => openEvent(event);

grid.appendChild(card);

});


/* OPEN EVENT DETAILS */

function openEvent(event){

document.getElementById("eventsPage").style.display = "none";
document.getElementById("eventDetails").style.display = "block";

document.getElementById("icon").innerText = event.icon;
document.getElementById("title").innerText = event.title;
document.getElementById("date").innerText = "📅 " + event.date;
document.getElementById("time").innerText = "⏰ " + event.time;
document.getElementById("location").innerText = "📍 " + event.location;

}


/* BUTTONS */

function rsvpEvent(){
alert("✅ You are going to this event!");
}

function saveEvent(){
alert("⭐ Event saved to favourites!");
}

function goBack(){

document.getElementById("eventDetails").style.display = "none";
document.getElementById("eventsPage").style.display = "block";

}

</script>

</body>
</html>
