<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>All Events</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f3efe9;
padding:60px;
}

/* HEADER */

h1{
font-size:40px;
margin-bottom:10px;
}

.events-count{
color:#666;
margin-bottom:40px;
}

/* GRID */

.events-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

/* CARD */

.event-card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
transition:0.2s;
}

.event-card:hover{
transform:translateY(-6px);
}

/* ICON AREA */

.event-image{
height:120px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
position:relative;
}

/* CATEGORY BUTTON */

.category-btn{
position:absolute;
top:10px;
left:10px;
background:white;
padding:4px 10px;
border-radius:12px;
font-size:12px;
font-weight:bold;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* CATEGORY COLORS */

.sports{background:#dfeae4;}
.social{background:#efe0d7;}
.study{background:#dbe3ee;}
.culture{background:#e8e0f2;}

/* DETAILS */

.event-details{
padding:20px;
}

.event-details h3{
margin:10px 0;
}

.event-meta{
color:#666;
font-size:14px;
}

</style>

</head>

<body>

<h1>All Events</h1>
<p class="events-count">Showing 8 events</p>

<div class="events-grid"></div>

<script src="events.js"></script>
<script src="all-events.js"></script>

</body>

</html>
