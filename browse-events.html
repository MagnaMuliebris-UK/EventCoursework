<!DOCTYPE html>
<html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="generalFormatting.css">
  <link rel="stylesheet" href="browse-events.css">
  <script src = "events.js"></script>
  <script src= "browse-events.js"></script>
  <meta charset="UTF-8">
  <title>Events App</title>

</head>

<body>

  <nav style="
  position: sticky;
  top: 0;
  z-index: 100;
  height: 64px;
  background: rgba(245, 242, 235, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid #e2ddd4;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
">
  <div style="
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #1a1a18;
  ">
    Campus<span style="color: #e85d26;">Events</span>
  </div>
  <div style="display: flex; gap: 8px;">
    <a href="index.html" style="
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: #6b6b63;
      padding: 6px 14px;
      border-radius: 8px;
    ">Home</a>
    <a href="browse-events.html" style="
      text-decoration: none;

      font-size: 0.9rem;
      font-weight: 500;

      border-radius: 8px;
    ">Browse Events</a>

<!-- ======================= -->
<!-- ALL EVENTS PAGE -->
<!-- ======================= -->

<div id="eventsPage">

<h1>All Events</h1>
<p class="events-count">Showing 8 events</p>

  <!-- SEARCH BAR  -->
<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input type="text" id="searchInput" placeholder="Search events, locations…" autocomplete="off" />
</div>

<!-- FILTER BUTTONS -->
<div class="filter-strip" id="filterStrip">
  <button class="filter-btn active" data-cat="All">All</button>
  <button class="filter-btn" data-cat="Sports">Sports</button>
  <button class="filter-btn" data-cat="Study">Study</button>
  <button class="filter-btn" data-cat="Social">Social</button>
  <button class="filter-btn" data-cat="Culture">Culture</button>
</div>

<div class="events-grid" id="eventsGrid"></div>

</div>
<div class="content">
<h1>Add Event</h1>

      <form>
          <label class = "required" for="eventTitle">Event Title:</label><br>
                <input type="text" id="eventTitle" name="eventTitle" required 
                placeholder="Enter Event Title"
                oninvalid="this.setCustomValidity('Enter Event Title Here: must only contain letters')"
                oninput="setCustomValidity('')"><br>
          <label class = "required" for="eventDate">Event Date:</label><br>
                <input type="date" id="eventDate" name="eventDate" required 
                placeholder="Enter Event Date"
                oninvalid="this.setCustomValidity('Enter Event Date Here: must be in YYYY-MM-DD format, including dashes')"
                oninput="setCustomValidity('')"><br>
        <label class = "required" for="eventTime">Event Time:</label><br>
                <input type="time" id="eventTime" name="eventTime" required 
                placeholder="Enter Event Time"
                oninvalid="this.setCustomValidity('Enter Event Time Here: must be in HH:MM or HH:MM AM or HH:MM PM format including the colon and space')"
                oninput="setCustomValidity('')"><br>

        <select id="eventType" size="1">
            <option>Choose Event Category</option>
            <option>Sports</option>
            <option>Study</option>
            <option>Social</option>
            <option>Culture</option>
          </select>
        <label class = "required" for="eventLocation">Event Location:</label><br>
                <input type="text" id="eventLocation" name="eventLocation" required 
                placeholder="Enter Event Location"
                oninvalid="this.setCustomValidity('Enter Event Location Here: no special characters allowed')" 
                oninput="setCustomValidity('')"><br><!--Should be noted, the no special characters part IS a lie, but is easier to explain than "yeah, alphanum, and "," "'" and "-". Mostly added leniency-->
        <select id="eventIcon" size="1">
            <option>Choose Icon</option>
            <option>⚽</option>
            <option>🎉</option>
            <option>📚</option>
            <option>🎭</option>
            <option>🏀</option>
            <option>💼</option>
            <option>🍜</option>
            <option>🫱🏽‍🫲🏾🌍</option>
          </select>
          <br><br>
          <button type="submit" id="submitButton">Add Event</button>
        </form>
      </div>

<!-- ======================= -->
<!-- EVENT DETAILS PAGE -->
<!-- ======================= -->

<div id="eventDetails" class="event-box">

<div id="icon" class="event-icon"></div>

<h1 id="title" class="event-title"></h1>

<p id="date" class="event-info"></p>
<p id="time" class="event-info"></p>
<p id="location" class="event-info"></p>

<div class="buttons">

<button class="going" onclick="rsvpEvent()">I'm Going!</button>

<button class="favourite" onclick="saveEvent()">Save Favourite</button>

<br>

<button class="back" onclick="goBack()">Back to Events</button>

</div>

</div>

</body>
</html>
